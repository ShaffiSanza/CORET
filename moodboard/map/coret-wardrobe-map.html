<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORET — Wardrobe Map</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1714;
    --card: #221f1a;
    --card-raised: #282420;
    --border: #2e2a22;
    --border-light: #3a3530;
    --text: #EAE5DE;
    --text-2: #B0A99E;
    --text-3: #6B625C;
    --text-4: #4a4540;
    --gold: #C9A96E;
    --gold-dim: rgba(201,169,110,0.55);
    --gold-soft: rgba(201,169,110,0.10);
    --gold-glow: rgba(201,169,110,0.04);
    --green: #7A9A6E;
    --green-soft: rgba(122,154,110,0.10);
    --red: #B4705A;
    --red-soft: rgba(180,90,70,0.10);
    --r: 18px;
    --r-sm: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #0e0c0a;
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 20px;
    -webkit-font-smoothing: antialiased;
  }

  .phone {
    width: 375px;
    height: 812px;
    background: var(--bg);
    border-radius: 44px;
    border: 2.5px solid #2a2520;
    overflow: hidden;
    position: relative;
    box-shadow: 0 40px 100px rgba(0,0,0,0.5);
  }

  /* Ambient field — reacts to selected node */
  .phone::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background: radial-gradient(circle at 50% 50%, rgba(201,169,110,0.04), transparent 60%);
    transition: background 1.2s ease;
  }

  .phone[data-focus="garment"]::after {
    background: radial-gradient(circle at var(--fx, 50%) var(--fy, 50%), rgba(201,169,110,0.08), transparent 50%);
  }

  .phone[data-focus="gap"]::after {
    background: radial-gradient(circle at var(--fx, 50%) var(--fy, 50%), rgba(180,90,70,0.10), transparent 50%);
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 28px 0;
    font-size: 15px;
    font-weight: 600;
    position: relative;
    z-index: 10;
  }

  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px 0;
    position: relative;
    z-index: 10;
  }

  .back-btn {
    font-size: 13px;
    color: var(--text-3);
    cursor: pointer;
    background: none;
    border: none;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .map-title {
    font-family: 'Instrument Serif', serif;
    font-size: 15px;
    color: var(--text);
    letter-spacing: 0.5px;
  }

  .map-mode {
    font-size: 11px;
    color: var(--text-4);
    cursor: pointer;
    background: none;
    border: none;
    font-family: inherit;
  }

  /* ═══ GRAPH CANVAS — Full area ═══ */
  .graph-area {
    position: absolute;
    top: 80px;
    left: 0;
    right: 0;
    bottom: 138px;
    z-index: 1;
  }

  .graph-area canvas {
    width: 100%;
    height: 100%;
    cursor: grab;
  }

  .graph-area canvas:active { cursor: grabbing; }

  /* ═══ LEGEND — Bottom left ═══ */
  .map-legend {
    position: absolute;
    bottom: 148px;
    left: 16px;
    z-index: 5;
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding: 10px 12px;
    background: rgba(26,23,20,0.75);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(201,169,110,0.08);
    border-radius: 10px;
  }

  .legend-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 9px;
    color: var(--text-4);
    letter-spacing: 0.3px;
  }

  .legend-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .legend-dot.g { background: var(--gold); }
  .legend-dot.l { background: var(--green); opacity: 0.6; }
  .legend-dot.gap { background: var(--red); }
  .legend-dot.anchor { background: var(--gold); box-shadow: 0 0 6px rgba(201,169,110,0.5); }

  /* ═══ STATS BAR — Bottom ═══ */
  .stats-bar {
    position: absolute;
    bottom: 76px;
    left: 12px;
    right: 12px;
    z-index: 5;
    display: flex;
    gap: 6px;
  }

  .stat-chip {
    flex: 1;
    padding: 10px 8px;
    background: rgba(34,31,26,0.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(201,169,110,0.08);
    border-radius: 12px;
    text-align: center;
    transition: all .35s cubic-bezier(.16,1,.3,1);
  }

  .stat-chip:hover { border-color: rgba(201,169,110,0.15); transform: translateY(-2px); }

  .stat-val {
    font-family: 'Instrument Serif', serif;
    font-size: 18px;
    color: var(--text);
    line-height: 1.25;
  }

  .stat-label {
    font-size: 8px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-4);
    margin-top: 2px;
  }

  .stat-chip.alert .stat-val { color: var(--red); }

  /* ═══ NODE DETAIL PANEL — slides up on tap ═══ */
  .node-panel {
    position: absolute;
    bottom: 76px;
    left: 12px;
    right: 12px;
    z-index: 6;
    background: var(--card-raised);
    border: 1px solid rgba(201,169,110,0.12);
    border-radius: var(--r);
    padding: 16px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    transform: translateY(120%);
    opacity: 0;
    transition: all .45s cubic-bezier(.16,1,.3,1);
    pointer-events: none;
  }

  .node-panel.visible {
    transform: translateY(0);
    opacity: 1;
    pointer-events: auto;
  }

  .np-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }

  .np-emoji {
    font-size: 28px;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.02);
    border-radius: 10px;
  }

  .np-info { flex: 1; }

  .np-name {
    font-family: 'Instrument Serif', serif;
    font-size: 18px;
    color: var(--text);
    line-height: 1.25;
  }

  .np-meta {
    font-size: 10px;
    letter-spacing: 0.5px;
    color: var(--text-4);
    text-transform: uppercase;
    margin-top: 2px;
  }

  .np-close {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: var(--text-4);
    cursor: pointer;
    flex-shrink: 0;
  }

  .np-stats {
    display: flex;
    gap: 8px;
  }

  .np-stat {
    flex: 1;
    padding: 8px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 8px;
    text-align: center;
  }

  .np-stat-val {
    font-family: 'Instrument Serif', serif;
    font-size: 16px;
    color: var(--gold);
    line-height: 1.25;
  }

  .np-stat-label {
    font-size: 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-4);
    margin-top: 1px;
  }

  /* Gap variant */
  .node-panel.gap-panel { border-color: rgba(180,90,70,0.15); }
  .gap-panel .np-stat-val { color: var(--red); }
  .gap-panel .np-name { color: var(--red); }

  /* ═══ TAB BAR ═══ */
  .tab-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 68px;
    background: rgba(30,26,21,0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding-bottom: 6px;
    z-index: 10;
  }

  .tab {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    padding: 6px 10px;
  }

  .tab-i { font-size: 17px; opacity: 0.3; }
  .tab-l { font-size: 8.5px; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-4); }
  .tab.on .tab-i { opacity: 1; }
  .tab.on .tab-l { color: var(--gold-dim); }

  .phone-label {
    text-align: center;
    margin-top: 16px;
    font-size: 11px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-4);
  }
</style>
</head>
<body>

<div>
  <div class="phone" id="phone" data-focus="none">
    <div class="top-bar">
      <span>9:41</span>
      <span style="font-size:12px;color:var(--text-3);">●●●●  📶  🔋</span>
    </div>

    <div class="nav-row">
      <button class="back-btn">← Optimize</button>
      <span class="map-title">Wardrobe Map</span>
      <button class="map-mode" id="modeBtn" onclick="toggleMode()">Layers</button>
    </div>

    <!-- ═══ GRAPH ═══ -->
    <div class="graph-area">
      <canvas id="mapCanvas"></canvas>
    </div>

    <!-- ═══ LEGEND ═══ -->
    <div class="map-legend">
      <div class="legend-row"><div class="legend-dot anchor"></div> Anchor garment</div>
      <div class="legend-row"><div class="legend-dot g"></div> Garment</div>
      <div class="legend-row"><div class="legend-dot l"></div> Combination link</div>
      <div class="legend-row"><div class="legend-dot gap"></div> Structural gap</div>
    </div>

    <!-- ═══ STATS ═══ -->
    <div class="stats-bar" id="statsBar">
      <div class="stat-chip">
        <div class="stat-val">17</div>
        <div class="stat-label">Plagg</div>
      </div>
      <div class="stat-chip">
        <div class="stat-val">48</div>
        <div class="stat-label">Kombos</div>
      </div>
      <div class="stat-chip">
        <div class="stat-val">78</div>
        <div class="stat-label">Clarity</div>
      </div>
      <div class="stat-chip alert">
        <div class="stat-val">2</div>
        <div class="stat-label">Gaps</div>
      </div>
    </div>

    <!-- ═══ NODE DETAIL PANEL ═══ -->
    <div class="node-panel" id="nodePanel">
      <div class="np-header">
        <div class="np-emoji" id="npEmoji">🧥</div>
        <div class="np-info">
          <div class="np-name" id="npName">Brun Frakk</div>
          <div class="np-meta" id="npMeta">Ytterlag · Relaxed · Warm</div>
        </div>
        <div class="np-close" onclick="closePanel()">×</div>
      </div>
      <div class="np-stats">
        <div class="np-stat">
          <div class="np-stat-val" id="npCombos">14</div>
          <div class="np-stat-label">Kombos</div>
        </div>
        <div class="np-stat">
          <div class="np-stat-val" id="npStrength">92</div>
          <div class="np-stat-label">Styrke</div>
        </div>
        <div class="np-stat">
          <div class="np-stat-val" id="npRole">Anchor</div>
          <div class="np-stat-label">Rolle</div>
        </div>
      </div>
    </div>

    <!-- ═══ TAB BAR ═══ -->
    <div class="tab-bar">
      <div class="tab"><span class="tab-i">▦</span><span class="tab-l">Wardrobe</span></div>
      <div class="tab"><span class="tab-i">✦</span><span class="tab-l">Studio</span></div>
      <div class="tab on"><span class="tab-i">◎</span><span class="tab-l">Optimize</span></div>
      <div class="tab"><span class="tab-i">◈</span><span class="tab-l">Evolution</span></div>
    </div>
  </div>
  <div class="phone-label">Wardrobe Map — System Graph</div>
</div>

<script>
  // ═══ WARDROBE MAP — Force-directed system graph ═══
  const canvas = document.getElementById('mapCanvas');
  const ctx = canvas.getContext('2d');
  const phone = document.getElementById('phone');
  const dpr = window.devicePixelRatio || 1;

  let W, H;
  function resize() {
    const rect = canvas.parentElement.getBoundingClientRect();
    W = rect.width;
    H = rect.height;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();

  // ═══ GARMENT DATA — mirrors the engine's wardrobe ═══
  const garments = [
    // Outer
    { id: 0, x: 0, y: 0, vx: 0, vy: 0, r: 16, color: '#8B6B4A', label: 'Ullfrakk', emoji: '🧥', layer: 'outer', type: 'garment', anchor: true, combos: 14, strength: 92, meta: 'Ytterlag · Relaxed · Warm' },
    { id: 1, x: 0, y: 0, vx: 0, vy: 0, r: 13, color: '#1A1A1A', label: 'Skinnjakke', emoji: '🧥', layer: 'outer', type: 'garment', anchor: false, combos: 8, strength: 74, meta: 'Ytterlag · Fitted · Nøytral' },
    { id: 2, x: 0, y: 0, vx: 0, vy: 0, r: 13, color: '#5A6B3A', label: 'Oliven Bomber', emoji: '🧥', layer: 'outer', type: 'garment', anchor: false, combos: 7, strength: 68, meta: 'Ytterlag · Relaxed · Varm' },

    // Mid
    { id: 3, x: 0, y: 0, vx: 0, vy: 0, r: 11, color: '#3A3530', label: 'Svart Hoodie', emoji: '🧶', layer: 'mid', type: 'garment', anchor: false, combos: 5, strength: 52, meta: 'Mellom · Relaxed · Nøytral' },

    // Base
    { id: 4, x: 0, y: 0, vx: 0, vy: 0, r: 14, color: '#D4CFC7', label: 'Hvit T-shirt', emoji: '👕', layer: 'base', type: 'garment', anchor: false, combos: 12, strength: 85, meta: 'Base · Balanced · Nøytral' },
    { id: 5, x: 0, y: 0, vx: 0, vy: 0, r: 14, color: '#2C3E50', label: 'Navy Skjorte', emoji: '👔', layer: 'base', type: 'garment', anchor: true, combos: 10, strength: 88, meta: 'Base · Fitted · Cool' },
    { id: 6, x: 0, y: 0, vx: 0, vy: 0, r: 12, color: '#1A1A1A', label: 'Sort T-shirt', emoji: '👕', layer: 'base', type: 'garment', anchor: false, combos: 9, strength: 72, meta: 'Base · Balanced · Nøytral' },
    { id: 7, x: 0, y: 0, vx: 0, vy: 0, r: 11, color: '#E8E0D4', label: 'Beige Polo', emoji: '👕', layer: 'base', type: 'garment', anchor: false, combos: 4, strength: 45, meta: 'Base · Balanced · Varm' },
    { id: 8, x: 0, y: 0, vx: 0, vy: 0, r: 10, color: '#8B5060', label: 'Burgundy Skjorte', emoji: '👔', layer: 'base', type: 'garment', anchor: false, combos: 3, strength: 38, meta: 'Base · Fitted · Aksent' },

    // Bottoms
    { id: 9, x: 0, y: 0, vx: 0, vy: 0, r: 14, color: '#C4B08A', label: 'Beige Chinos', emoji: '👖', layer: 'bottom', type: 'garment', anchor: true, combos: 11, strength: 90, meta: 'Bukse · Tapered · Varm' },
    { id: 10, x: 0, y: 0, vx: 0, vy: 0, r: 13, color: '#1A1A1A', label: 'Svarte Jeans', emoji: '👖', layer: 'bottom', type: 'garment', anchor: false, combos: 10, strength: 78, meta: 'Bukse · Slim · Nøytral' },
    { id: 11, x: 0, y: 0, vx: 0, vy: 0, r: 11, color: '#7A9AB0', label: 'Lyse Jeans', emoji: '👖', layer: 'bottom', type: 'garment', anchor: false, combos: 5, strength: 55, meta: 'Bukse · Relaxed · Cool' },

    // Shoes
    { id: 12, x: 0, y: 0, vx: 0, vy: 0, r: 10, color: '#6B4226', label: 'Brune Boots', emoji: '👞', layer: 'shoes', type: 'garment', anchor: false, combos: 6, strength: 62, meta: 'Sko · Structured · Varm' },
    { id: 13, x: 0, y: 0, vx: 0, vy: 0, r: 9, color: '#E8E0D4', label: 'Hvite Sneakers', emoji: '👟', layer: 'shoes', type: 'garment', anchor: false, combos: 4, strength: 48, meta: 'Sko · Minimal · Nøytral' },
    { id: 14, x: 0, y: 0, vx: 0, vy: 0, r: 9, color: '#2A2520', label: 'Svarte Derby', emoji: '👞', layer: 'shoes', type: 'garment', anchor: false, combos: 3, strength: 42, meta: 'Sko · Structured · Nøytral' },

    // GAP NODES
    { id: 15, x: 0, y: 0, vx: 0, vy: 0, r: 18, color: '#B4705A', label: 'Mellomlag gap', emoji: '◇', layer: 'mid', type: 'gap', anchor: false, combos: 0, strength: 0, meta: 'Blazer · Overshirt · +13 clarity' },
    { id: 16, x: 0, y: 0, vx: 0, vy: 0, r: 15, color: '#B4705A', label: 'Sommer gap', emoji: '◇', layer: 'base', type: 'gap', anchor: false, combos: 0, strength: 0, meta: 'Sommer base · +6 clarity' },
  ];

  // Combination links (garment-to-garment)
  const links = [
    [0, 4], [0, 5], [0, 9], [0, 10], [0, 12],
    [1, 4], [1, 6], [1, 10], [1, 14],
    [2, 3], [2, 6], [2, 10], [2, 13],
    [3, 6], [3, 10],
    [4, 9], [4, 10], [4, 11], [4, 13],
    [5, 9], [5, 10], [5, 12],
    [6, 9], [6, 10], [6, 11], [6, 14],
    [7, 11], [7, 13],
    [8, 10], [8, 12],
    [9, 12], [9, 13],
    [10, 14],
  ];

  // Gap connections (potential links — dashed)
  const gapLinks = [
    [15, 0], [15, 4], [15, 5], [15, 9],
    [16, 7], [16, 11], [16, 13],
  ];

  // Layer colors for mode
  const layerColors = {
    outer: 'rgba(201,169,110,0.7)',
    mid: 'rgba(140,120,200,0.7)',
    base: 'rgba(122,154,110,0.7)',
    bottom: 'rgba(100,140,180,0.7)',
    shoes: 'rgba(180,160,140,0.5)',
  };

  // Initialize positions in a rough circle
  garments.forEach((g, i) => {
    const angle = (i / garments.length) * Math.PI * 2 - Math.PI / 2;
    const radius = 100 + (g.anchor ? 0 : 40 + Math.random() * 30);
    g.x = W / 2 + Math.cos(angle) * radius;
    g.y = H / 2 + Math.sin(angle) * radius;
  });

  let time = 0;
  let selectedNode = null;
  let showLayers = false;
  let dragNode = null;
  let mouseX = 0, mouseY = 0;

  // ═══ FORCE SIMULATION ═══
  function simulate() {
    const center = { x: W / 2, y: H / 2 };
    const damping = 0.92;

    garments.forEach(g => {
      // Gravity toward center
      const dx = center.x - g.x;
      const dy = center.y - g.y;
      g.vx += dx * 0.0003;
      g.vy += dy * 0.0003;

      // Repulsion between all nodes
      garments.forEach(o => {
        if (o.id === g.id) return;
        const rx = g.x - o.x;
        const ry = g.y - o.y;
        const dist = Math.sqrt(rx * rx + ry * ry) || 1;
        const minDist = (g.r + o.r) * 2.5;
        if (dist < minDist) {
          const force = (minDist - dist) / dist * 0.08;
          g.vx += rx * force;
          g.vy += ry * force;
        }
      });
    });

    // Spring forces along links
    const applySpring = (pairs, strength) => {
      pairs.forEach(([a, b]) => {
        const ga = garments[a];
        const gb = garments[b];
        const dx = gb.x - ga.x;
        const dy = gb.y - ga.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        const target = 70;
        const force = (dist - target) / dist * strength;
        ga.vx += dx * force;
        ga.vy += dy * force;
        gb.vx -= dx * force;
        gb.vy -= dy * force;
      });
    };

    applySpring(links, 0.003);
    applySpring(gapLinks, 0.001);

    // Apply velocity
    garments.forEach(g => {
      if (g === dragNode) return;
      g.vx *= damping;
      g.vy *= damping;
      g.x += g.vx;
      g.y += g.vy;

      // Keep in bounds
      const pad = 30;
      g.x = Math.max(pad, Math.min(W - pad, g.x));
      g.y = Math.max(pad, Math.min(H - pad, g.y));
    });
  }

  // ═══ DRAW ═══
  function draw() {
    time += 0.006;
    simulate();

    ctx.clearRect(0, 0, W, H);

    // Subtle grid dots
    ctx.fillStyle = 'rgba(201,169,110,0.03)';
    for (let x = 20; x < W; x += 30) {
      for (let y = 20; y < H; y += 30) {
        ctx.beginPath();
        ctx.arc(x, y, 0.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // ── Draw links ──
    links.forEach(([a, b]) => {
      const ga = garments[a];
      const gb = garments[b];
      const isHighlighted = selectedNode !== null && (a === selectedNode || b === selectedNode);
      ctx.beginPath();
      ctx.moveTo(ga.x, ga.y);
      ctx.lineTo(gb.x, gb.y);
      ctx.strokeStyle = isHighlighted
        ? 'rgba(122,154,110,0.35)'
        : 'rgba(122,154,110,0.07)';
      ctx.lineWidth = isHighlighted ? 1.2 : 0.5;
      ctx.stroke();
    });

    // ── Draw gap links (dashed) ──
    ctx.setLineDash([3, 5]);
    gapLinks.forEach(([a, b]) => {
      const ga = garments[a];
      const gb = garments[b];
      const pulse = 0.05 + Math.sin(time * 2) * 0.04;
      const isHighlighted = selectedNode !== null && (a === selectedNode || b === selectedNode);
      ctx.beginPath();
      ctx.moveTo(ga.x, ga.y);
      ctx.lineTo(gb.x, gb.y);
      ctx.strokeStyle = isHighlighted
        ? `rgba(180,90,70,${pulse + 0.15})`
        : `rgba(180,90,70,${pulse})`;
      ctx.lineWidth = isHighlighted ? 1 : 0.6;
      ctx.stroke();
    });
    ctx.setLineDash([]);

    // ── Draw nodes ──
    garments.forEach((g, i) => {
      const isSelected = selectedNode === g.id;
      const isConnected = selectedNode !== null && (
        links.some(([a, b]) => (a === selectedNode && b === g.id) || (b === selectedNode && a === g.id)) ||
        gapLinks.some(([a, b]) => (a === selectedNode && b === g.id) || (b === selectedNode && a === g.id))
      );
      const dimmed = selectedNode !== null && !isSelected && !isConnected;

      if (g.type === 'gap') {
        // Gap node — pulsing ring
        const pulseR = g.r + Math.sin(time * 2) * 4;
        const pulseA = dimmed ? 0.04 : (0.08 + Math.sin(time * 2) * 0.06);

        // Outer pulse
        ctx.beginPath();
        ctx.arc(g.x, g.y, pulseR + 10, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(180,90,70,${pulseA * 0.3})`;
        ctx.fill();

        // Body
        ctx.beginPath();
        ctx.arc(g.x, g.y, pulseR, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(180,90,70,${pulseA})`;
        ctx.fill();

        // Dashed border
        ctx.beginPath();
        ctx.arc(g.x, g.y, pulseR, 0, Math.PI * 2);
        ctx.setLineDash([3, 3]);
        ctx.strokeStyle = `rgba(180,90,70,${pulseA + 0.12})`;
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.setLineDash([]);

        // Label
        if (!dimmed) {
          ctx.font = '8px DM Sans';
          ctx.fillStyle = `rgba(180,112,90,${0.5 + Math.sin(time * 2) * 0.2})`;
          ctx.textAlign = 'center';
          ctx.fillText('GAP', g.x, g.y + 3);
        }

      } else {
        // Garment node
        const baseAlpha = dimmed ? 0.15 : 1;
        const breathe = Math.sin(time + i * 0.7) * 0.03;

        // Anchor glow
        if (g.anchor && !dimmed) {
          ctx.beginPath();
          ctx.arc(g.x, g.y, g.r + 10, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(201,169,110,${0.06 + breathe})`;
          ctx.fill();

          ctx.beginPath();
          ctx.arc(g.x, g.y, g.r + 5, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(201,169,110,${0.1 + breathe})`;
          ctx.fill();
        }

        // Node body
        const drawR = g.r * (isSelected ? 1.2 : 1);
        ctx.beginPath();
        ctx.arc(g.x, g.y, drawR, 0, Math.PI * 2);

        if (showLayers) {
          ctx.fillStyle = dimmed
            ? `rgba(60,55,50,${baseAlpha})`
            : layerColors[g.layer] || g.color;
        } else {
          ctx.globalAlpha = baseAlpha;
          ctx.fillStyle = g.color;
        }
        ctx.fill();
        ctx.globalAlpha = 1;

        // Rim
        ctx.beginPath();
        ctx.arc(g.x, g.y, drawR, 0, Math.PI * 2);
        ctx.strokeStyle = isSelected
          ? 'rgba(201,169,110,0.6)'
          : dimmed
            ? 'rgba(234,229,222,0.03)'
            : `rgba(234,229,222,${0.12 + breathe})`;
        ctx.lineWidth = isSelected ? 1.5 : 0.5;
        ctx.stroke();

        // Label
        if ((isSelected || isConnected || (!dimmed && g.r >= 12)) && !showLayers) {
          ctx.font = `${isSelected ? '500 ' : ''}9px DM Sans`;
          ctx.fillStyle = isSelected
            ? 'rgba(234,229,222,0.8)'
            : `rgba(234,229,222,${dimmed ? 0.1 : 0.35})`;
          ctx.textAlign = 'center';
          ctx.fillText(g.label, g.x, g.y + drawR + 12);
        }

        // Layer label in layer mode
        if (showLayers && !dimmed) {
          ctx.font = '7px DM Sans';
          ctx.fillStyle = 'rgba(234,229,222,0.5)';
          ctx.textAlign = 'center';
          ctx.fillText(g.layer.toUpperCase(), g.x, g.y + drawR + 10);
        }
      }
    });

    requestAnimationFrame(draw);
  }

  draw();

  // ═══ INTERACTION ═══
  function getNodeAt(mx, my) {
    for (let i = garments.length - 1; i >= 0; i--) {
      const g = garments[i];
      const dx = mx - g.x;
      const dy = my - g.y;
      if (dx * dx + dy * dy < (g.r + 8) * (g.r + 8)) return g;
    }
    return null;
  }

  canvas.addEventListener('pointerdown', (e) => {
    const rect = canvas.getBoundingClientRect();
    mouseX = e.clientX - rect.left;
    mouseY = e.clientY - rect.top;
    const node = getNodeAt(mouseX, mouseY);
    if (node) {
      dragNode = node;
      selectNode(node);
    } else {
      closePanel();
    }
  });

  canvas.addEventListener('pointermove', (e) => {
    if (!dragNode) return;
    const rect = canvas.getBoundingClientRect();
    dragNode.x = e.clientX - rect.left;
    dragNode.y = e.clientY - rect.top;
    dragNode.vx = 0;
    dragNode.vy = 0;
  });

  canvas.addEventListener('pointerup', () => { dragNode = null; });
  canvas.addEventListener('pointerleave', () => { dragNode = null; });

  function selectNode(node) {
    selectedNode = node.id;

    // Update ambient focus
    const pctX = (node.x / W * 100).toFixed(0);
    const pctY = (node.y / H * 100).toFixed(0);
    phone.style.setProperty('--fx', pctX + '%');
    phone.style.setProperty('--fy', pctY + '%');
    phone.dataset.focus = node.type;

    // Show panel
    const panel = document.getElementById('nodePanel');
    document.getElementById('npEmoji').textContent = node.emoji;
    document.getElementById('npName').textContent = node.label;
    document.getElementById('npMeta').textContent = node.meta;

    if (node.type === 'gap') {
      panel.classList.add('gap-panel');
      document.getElementById('npCombos').textContent = '+18';
      document.getElementById('npStrength').textContent = '+13';
      document.getElementById('npRole').textContent = 'Gap';
      document.querySelector('.np-stats .np-stat:nth-child(1) .np-stat-label').textContent = 'Nye kombos';
      document.querySelector('.np-stats .np-stat:nth-child(2) .np-stat-label').textContent = 'Clarity';
    } else {
      panel.classList.remove('gap-panel');
      document.getElementById('npCombos').textContent = node.combos;
      document.getElementById('npStrength').textContent = node.strength;
      document.getElementById('npRole').textContent = node.anchor ? 'Anchor' : 'Support';
      document.querySelector('.np-stats .np-stat:nth-child(1) .np-stat-label').textContent = 'Kombos';
      document.querySelector('.np-stats .np-stat:nth-child(2) .np-stat-label').textContent = 'Styrke';
    }

    panel.classList.add('visible');
    document.getElementById('statsBar').style.opacity = '0';
  }

  function closePanel() {
    selectedNode = null;
    phone.dataset.focus = 'none';
    document.getElementById('nodePanel').classList.remove('visible');
    document.getElementById('statsBar').style.opacity = '1';
  }

  function toggleMode() {
    showLayers = !showLayers;
    document.getElementById('modeBtn').textContent = showLayers ? 'Network' : 'Layers';
  }
</script>

</body>
</html>
