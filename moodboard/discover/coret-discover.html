<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0">
<title>CORET — Discover</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#0a0908;color:#EAE5DE;display:flex;justify-content:center;padding:40px 20px 60px;-webkit-font-smoothing:antialiased}
.phone{width:393px;height:852px;border-radius:44px;border:2.5px solid #2a2520;overflow:hidden;position:relative;box-shadow:0 40px 100px rgba(0,0,0,0.6);background:#0E0C0A}
.grain{position:absolute;inset:0;pointer-events:none;z-index:50;opacity:.010;mix-blend-mode:overlay;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

.card-container{position:absolute;inset:0;z-index:1;overflow:hidden;touch-action:pan-y}

/* Outfit card */
.outfit-card{
  position:absolute;inset:0;display:flex;flex-direction:column;
  transition:transform .5s cubic-bezier(.16,1,.3,1),opacity .4s;will-change:transform;
}
.outfit-card.exiting{transform:translateY(-100%);opacity:0}
.outfit-card.entering{transform:translateY(100%);opacity:0}
.outfit-card.active{transform:translateY(0);opacity:1}

/* Dynamic bg — cinematisk */
.oc-bg{position:absolute;inset:0;pointer-events:none;z-index:0;transition:all 1s ease}
.oc-blob{position:absolute;border-radius:50%;filter:blur(140px)}
.oc-b1{width:450px;height:450px;top:-20%;left:-35%;animation:obf 12s ease-in-out infinite alternate}
.oc-b2{width:350px;height:350px;bottom:0%;right:-30%;animation:obf 9s ease-in-out infinite alternate-reverse}
.oc-b3{width:200px;height:200px;top:40%;left:20%;animation:obf 11s ease-in-out infinite alternate}
@keyframes obf{0%{transform:scale(1);opacity:.10}100%{transform:scale(1.2);opacity:.20}}

/* Score watermark */
.score-watermark{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Instrument Serif',serif;font-size:220px;font-weight:400;
  color:rgba(255,255,255,.035);z-index:1;pointer-events:none;
  line-height:1;letter-spacing:-8px;
}

/* Toggle — 70/30 + Full */
.oc-toggle{
  position:relative;z-index:3;display:flex;justify-content:center;padding:58px 0 0;gap:0;flex-shrink:0;
}
.oc-toggle-btn{
  padding:6px 18px;font-size:10px;letter-spacing:1.2px;text-transform:uppercase;
  cursor:pointer;transition:all .3s;border:none;background:none;font-family:'DM Sans',sans-serif;
}
.oc-toggle-btn.active-gold{color:rgba(201,169,110,.7);border-bottom:1.5px solid rgba(201,169,110,.3)}
.oc-toggle-btn.active-sage{color:rgba(122,154,110,.7);border-bottom:1.5px solid rgba(122,154,110,.3)}
.oc-toggle-btn.inactive{color:rgba(255,255,255,.12);border-bottom:1.5px solid transparent}

/* Scroll dots — left side */
.scroll-dots{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);z-index:5;
  display:flex;flex-direction:column;gap:6px;
}
.scroll-dot{
  width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.08);
  transition:all .4s cubic-bezier(.16,1,.3,1);
}
.scroll-dot.active{background:rgba(201,169,110,.5);height:14px;border-radius:2px}

/* Stage */
.oc-stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;z-index:2;padding:0 50px 0 30px}
.oc-stack{display:flex;flex-direction:column;align-items:center;gap:6px;position:relative}

/* Garment item */
.oc-item{transition:all .4s cubic-bezier(.16,1,.3,1);position:relative;display:flex;align-items:center;justify-content:center}
.oc-item svg{filter:drop-shadow(0 20px 50px rgba(0,0,0,.5)) drop-shadow(0 6px 14px rgba(0,0,0,.3))}
/* Stack order: outer(1) → upper(2) → lower(3) → shoes(4) */
.oc-item:nth-child(1){z-index:4}
.oc-item:nth-child(2){z-index:3;margin-top:-8px;transform:scale(.96)}
.oc-item:nth-child(3){z-index:2;margin-top:-6px;transform:scale(.92)}
.oc-item:nth-child(4){z-index:1;margin-top:-4px;transform:scale(.88)}

/* Right-side actions — TikTok style */
.oc-actions{
  position:absolute;right:16px;top:50%;transform:translateY(-50%);z-index:6;
  display:flex;flex-direction:column;align-items:center;gap:18px;
}
.action-btn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;transition:all .3s cubic-bezier(.34,1.56,.64,1);
}
.action-btn:active{transform:scale(1.2)}
.action-circle{
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;backdrop-filter:blur(8px);
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
}
.action-circle.lg{width:46px;height:46px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.06)}
.action-circle.sm{width:38px;height:38px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.04)}
.action-label{font-size:7px;letter-spacing:.5px;color:rgba(255,255,255,.12);text-transform:uppercase}
.action-circle svg{stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}

/* Like action */
.action-btn.like .action-circle{color:rgba(255,255,255,.2)}
.action-btn.like.liked .action-circle{color:rgba(201,169,110,.7);background:rgba(201,169,110,.08);border-color:rgba(201,169,110,.15);box-shadow:0 0 20px rgba(201,169,110,.1)}

/* Hook/bookmark action */
.action-btn.hook .action-circle{color:rgba(255,255,255,.2)}
.action-btn.hook.saved .action-circle{color:rgba(201,169,110,.6);background:rgba(201,169,110,.08);border-color:rgba(201,169,110,.12)}

/* Pass action */
.action-btn.pass .action-circle{color:rgba(255,255,255,.12)}

/* Bottom info panel */
.oc-bottom{
  position:relative;z-index:3;padding:0 24px 16px;flex-shrink:0;
  background:linear-gradient(transparent,rgba(14,12,10,.85) 40%,rgba(14,12,10,.95));
  padding-top:40px;margin-top:-20px;
}
.oc-brand-line{font-size:9px;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.1);margin-bottom:6px}
.oc-outfit-name{
  font-family:'Instrument Serif',serif;font-style:italic;
  font-size:22px;color:rgba(255,255,255,.45);margin-bottom:10px;line-height:1.2;
}
.oc-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.oc-tag{
  font-size:9px;padding:4px 10px;border-radius:20px;
  background:rgba(255,255,255,.04);color:rgba(255,255,255,.2);
  border:1px solid rgba(255,255,255,.04);
}
.oc-tag.owned-tag{color:rgba(122,154,110,.35);background:rgba(122,154,110,.04);border-color:rgba(122,154,110,.06)}
.oc-tag.rotation-tag{color:rgba(201,169,110,.35);background:rgba(201,169,110,.04);border-color:rgba(201,169,110,.06)}

/* Swipe hint */
.swipe-hint{
  text-align:center;padding:8px 0 6px;font-size:8px;color:rgba(255,255,255,.06);
  letter-spacing:1px;animation:sh 2s ease-in-out infinite;
}
@keyframes sh{0%,100%{transform:translateY(0);opacity:.06}50%{transform:translateY(-3px);opacity:.12}}

/* Save feedback overlay */
.save-flash{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(14,12,10,.7);z-index:20;opacity:0;pointer-events:none;
  transition:opacity .3s;
}
.save-flash.visible{opacity:1}
.save-flash span{font-size:14px;color:rgba(201,169,110,.6);letter-spacing:1px;text-transform:uppercase}

/* End of feed card */
.end-card{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2;padding:40px;text-align:center}
.end-card h2{font-family:'Instrument Serif',serif;font-size:22px;color:rgba(255,255,255,.4);margin-bottom:12px}
.end-card p{font-size:13px;color:rgba(255,255,255,.15);line-height:1.5;max-width:260px}

/* Nav */
.nav{position:absolute;bottom:0;left:0;right:0;display:flex;justify-content:space-around;align-items:center;padding:6px 16px 28px;border-top:1px solid rgba(255,255,255,.03);background:linear-gradient(transparent,rgba(14,12,10,.98) 30%);z-index:10}
.ni{display:flex;flex-direction:column;align-items:center;gap:2px;opacity:.18;cursor:pointer;padding:4px 8px;position:relative}
.ni.on{opacity:.65}
.ni.on::before{content:'';position:absolute;top:-3px;left:50%;transform:translateX(-50%);width:30px;height:30px;background:radial-gradient(circle,rgba(201,169,110,.07),transparent 70%);border-radius:50%}
.ni svg{width:18px;height:18px;stroke:#B0A99E;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;position:relative;z-index:1}
.ni.on svg{stroke:#C9A96E}
.nl{font-size:7.5px;letter-spacing:.7px;text-transform:uppercase;color:rgba(255,255,255,.15)}
.ni.on .nl{color:rgba(201,169,110,.35)}

.phone-label{text-align:center;margin-top:16px;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.15)}
</style>
</head>
<body>
<div>
<div class="phone">
<div class="grain"></div>
<div class="card-container" id="container"></div>

<div class="nav">
  <div class="ni"><svg viewBox="0 0 24 24"><path d="M21 8V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v3"/><path d="M21 16v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-3"/><rect x="1" y="8" width="22" height="8" rx="2"/></svg><span class="nl">Wardrobe</span></div>
  <div class="ni"><svg viewBox="0 0 24 24"><polygon points="12,2 15,9 22,9 16,14 18,21 12,17 6,21 8,14 2,9 9,9"/></svg><span class="nl">Studio</span></div>
  <div class="ni on"><svg viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 1 1-14 0 7 7 0 0 1 14 0z"/></svg><span class="nl">Discover</span></div>
</div>
</div>
<div class="phone-label">Discover — Outfit Feed</div>
</div>

<script>
// ═══ GARMENT DATA (owned only — no ghosts in V1) ═══
const G={
  outer:[
    {svg:`<svg width="150" height="112" viewBox="0 0 160 120" fill="none"><path d="M40 15C40 8 120 8 120 15L128 40C128 44 152 48 158 55V95C158 102 148 108 138 108H128V112C128 118 40 118 40 112V108H28C18 108 8 102 8 95V55C14 48 32 44 32 40L40 15Z" fill="#4A2028" opacity=".9"/></svg>`,n:'Burgundy Jakke',b:'COS',c:[340,60,20],cat:'outer'},
    {svg:`<svg width="150" height="112" viewBox="0 0 160 120" fill="none"><path d="M40 15C40 8 120 8 120 15L128 40C128 44 152 48 158 55V95C158 102 148 108 138 108H128V112C128 118 40 118 40 112V108H28C18 108 8 102 8 95V55C14 48 32 44 32 40L40 15Z" fill="#1E2A3A" opacity=".9"/></svg>`,n:'Navy Frakk',b:'Massimo Dutti',c:[215,50,18],cat:'outer'},
    {svg:`<svg width="150" height="112" viewBox="0 0 160 120" fill="none"><path d="M40 15C40 8 120 8 120 15L128 40C128 44 152 48 158 55V95C158 102 148 108 138 108H128V112C128 118 40 118 40 112V108H28C18 108 8 102 8 95V55C14 48 32 44 32 40L40 15Z" fill="#2A3520" opacity=".9"/></svg>`,n:'Oliven Bomber',b:'Arket',c:[100,40,16],cat:'outer'}
  ],
  base:[
    {svg:`<svg width="110" height="76" viewBox="0 0 100 70" fill="none"><path d="M28 8C28 4 72 4 72 8L76 18C76 20 94 22 100 28V58C100 64 92 68 84 68H16C8 68 0 64 0 58V28C6 22 24 20 24 18L28 8Z" fill="#1A1A1E" opacity=".9"/></svg>`,n:'Sort Tee',b:'H&M',c:[240,10,10],cat:'base'},
    {svg:`<svg width="110" height="76" viewBox="0 0 100 70" fill="none"><path d="M28 8C28 4 72 4 72 8L76 18C76 20 94 22 100 28V58C100 64 92 68 84 68H16C8 68 0 64 0 58V28C6 22 24 20 24 18L28 8Z" fill="#E0DAD0" opacity=".9"/></svg>`,n:'Hvit Tee',b:'Uniqlo',c:[35,15,85],cat:'base'},
    {svg:`<svg width="110" height="82" viewBox="0 0 40 52" fill="none"><path d="M11 4C11 2 29 2 29 4L31 12C31 14 38 14 40 18V46C40 50 36 52 32 52H8C4 52 0 50 0 46V18C2 14 9 14 9 12L11 4Z" fill="#1E2A3A" opacity=".9"/></svg>`,n:'Navy Skjorte',b:'Zara',c:[215,40,20],cat:'base'}
  ],
  lower:[
    {svg:`<svg width="100" height="122" viewBox="0 0 90 130" fill="none"><path d="M8 0H82C86 0 90 4 90 8V50L64 130H50L45 60L40 130H26L0 50V8C0 4 4 0 8 0Z" fill="#1A2030" opacity=".85"/></svg>`,n:'Morke Jeans',b:"Levi's",c:[215,40,14],cat:'lower'},
    {svg:`<svg width="100" height="122" viewBox="0 0 90 130" fill="none"><path d="M8 0H82C86 0 90 4 90 8V50L64 130H50L45 60L40 130H26L0 50V8C0 4 4 0 8 0Z" fill="#C4B89A" opacity=".8"/></svg>`,n:'Beige Chinos',b:'Arket',c:[38,30,65],cat:'lower'},
    {svg:`<svg width="100" height="122" viewBox="0 0 90 130" fill="none"><path d="M8 0H82C86 0 90 4 90 8V50L64 130H50L45 60L40 130H26L0 50V8C0 4 4 0 8 0Z" fill="#1A1A1E" opacity=".85"/></svg>`,n:'Svarte Bukser',b:'COS',c:[240,10,10],cat:'lower'}
  ],
  shoes:[
    {svg:`<svg width="110" height="44" viewBox="0 0 120 50" fill="none"><path d="M10 20C10 10 20 2 35 2H85C100 2 110 10 110 20V30C110 40 100 48 85 48H35C20 48 10 40 10 30V20Z" fill="#1A1A1E" opacity=".9"/></svg>`,n:'Svarte Loafers',b:'Massimo Dutti',c:[240,10,10],cat:'shoes'},
    {svg:`<svg width="110" height="44" viewBox="0 0 120 50" fill="none"><path d="M10 20C10 10 20 2 35 2H85C100 2 110 10 110 20V30C110 40 100 48 85 48H35C20 48 10 40 10 30V20Z" fill="#E0DAD0" opacity=".85"/></svg>`,n:'Hvite Sneakers',b:'Nike',c:[35,15,85],cat:'shoes'},
    {svg:`<svg width="110" height="44" viewBox="0 0 120 50" fill="none"><path d="M10 20C10 10 20 2 35 2H85C100 2 110 10 110 20V30C110 40 100 48 85 48H35C20 48 10 40 10 30V20Z" fill="#5A3020" opacity=".9"/></svg>`,n:'Brune Boots',b:'Red Wing',c:[20,55,25],cat:'shoes'}
  ]
};

const MAX_CARDS=20;
const cats=['outer','base','lower','shoes'];
let idx=0, hintShown=false;
let currentMode='7030'; // '7030' or 'full'

function pick(a){return a[Math.floor(Math.random()*a.length)]}
function generateCombo(){return cats.map(c=>pick(G[c]))}

// Fixed rhythm: owned-owned-owned-rotation, repeating
const RHYTHM=['owned','owned','owned','rotation'];
function feedType(){return RHYTHM[idx % RHYTHM.length]}

function hslAvg(combo){
  let h=0,s=0,l=0;
  combo.forEach(g=>{h+=g.c[0];s+=g.c[1];l+=g.c[2]});
  return[h/4,s/4,l/4];
}

// ═══ SCROLL DOTS ═══
function buildScrollDots(){
  const total=Math.min(MAX_CARDS,10); // show max 10 dots
  let html='';
  for(let i=0;i<total;i++){
    html+=`<div class="scroll-dot${i===0?' active':''}"></div>`;
  }
  return html;
}
function updateScrollDots(){
  const dots=document.querySelectorAll('.scroll-dot');
  const dotIdx=idx % dots.length;
  dots.forEach((d,i)=>{d.classList.toggle('active',i===dotIdx)});
}

// ═══ TOGGLE ═══
function setMode(mode){
  currentMode=mode;
  document.querySelectorAll('.oc-toggle-btn').forEach(b=>{
    b.classList.remove('active-gold','active-sage');
    b.classList.add('inactive');
  });
  const active=document.querySelector(`[data-mode="${mode}"]`);
  if(active){
    active.classList.remove('inactive');
    active.classList.add(mode==='7030'?'active-gold':'active-sage');
  }
}

function buildCard(combo,index,type,isFirst){
  const sc=68+Math.floor(Math.random()*28);
  const[aH,aS,aL]=hslAvg(combo);

  const card=document.createElement('div');
  card.className='outfit-card '+(index===0?'active':'entering');

  const badgeClass=type==='rotation'?'rotation-tag':'owned-tag';
  const hintHtml=(!hintShown)?`<div class="swipe-hint">&uarr; Swipe for neste</div>`:'';
  if(!hintShown) hintShown=true;

  // Outfit name from garment types
  const outfitName=combo.map(g=>g.n.split(' ').pop()).join(' + ');
  // Brand line
  const brands=[...new Set(combo.map(g=>g.b))].join(' &middot; ');

  card.innerHTML=`
    <div class="oc-bg">
      <div class="oc-blob oc-b1" style="background:hsla(${aH},${aS+15}%,${Math.max(aL-5,5)}%,.12)"></div>
      <div class="oc-blob oc-b2" style="background:hsla(${aH+30},${aS}%,${Math.max(aL-3,5)}%,.08)"></div>
      <div class="oc-blob oc-b3" style="background:hsla(${aH-20},${aS+10}%,${Math.max(aL,5)}%,.06)"></div>
    </div>
    <div class="score-watermark">${sc}</div>
    <div class="oc-toggle">
      <button class="oc-toggle-btn ${currentMode==='7030'?'active-gold':'inactive'}" data-mode="7030" onclick="event.stopPropagation();setMode('7030')">70/30</button>
      <button class="oc-toggle-btn ${currentMode==='full'?'active-sage':'inactive'}" data-mode="full" onclick="event.stopPropagation();setMode('full')">Full</button>
    </div>
    <div class="scroll-dots">${buildScrollDots()}</div>
    <div class="oc-stage">
      <div class="oc-stack">
        ${combo.map(g=>`<div class="oc-item">${g.svg}</div>`).join('')}
      </div>
    </div>
    <div class="oc-actions">
      <div class="action-btn like" onclick="event.stopPropagation();toggleLike(this)">
        <div class="action-circle lg"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z"/></svg></div>
        <span class="action-label">Like</span>
      </div>
      <div class="action-btn hook" onclick="event.stopPropagation();bookmarkOutfit(this)">
        <div class="action-circle lg"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2L4 7v13l8-5 8 5V7z"/></svg></div>
        <span class="action-label">Hook</span>
      </div>
      <div class="action-btn pass" onclick="event.stopPropagation();nextCard()">
        <div class="action-circle sm"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 6L6 18M6 6l12 12"/></svg></div>
        <span class="action-label">Pass</span>
      </div>
    </div>
    <div class="oc-bottom">
      <div class="oc-brand-line">${brands}</div>
      <div class="oc-outfit-name">${outfitName}</div>
      <div class="oc-tags">
        ${combo.map(g=>`<span class="oc-tag ${badgeClass}">${g.n}</span>`).join('')}
      </div>
      ${hintHtml}
    </div>
    <div class="save-flash" id="sf-${index}"><span>Lagret &#10003;</span></div>
  `;

  // Update scroll dots after render
  requestAnimationFrame(()=>updateScrollDots());

  // Swipe up = next, swipe right = save
  let startX=0,startY=0,currentX=0,currentY=0,dragging=false;
  card.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;startY=e.touches[0].clientY;dragging=true},{passive:true});
  card.addEventListener('touchmove',e=>{
    if(!dragging)return;currentX=e.touches[0].clientX;currentY=e.touches[0].clientY;
    const dx=currentX-startX,dy=currentY-startY;
    if(Math.abs(dy)>Math.abs(dx)&&dy<0) card.style.transform=`translateY(${dy*0.5}px)`;
    else if(dx>0) card.style.transform=`translateX(${dx*0.4}px) rotate(${dx*0.02}deg)`;
  },{passive:true});
  card.addEventListener('touchend',()=>{
    if(!dragging)return;dragging=false;
    const dx=currentX-startX,dy=currentY-startY;
    if(dy<-80&&Math.abs(dy)>Math.abs(dx)){nextCard();return}
    if(dx>100){saveOutfit(card,index);return}
    card.style.transition='transform .4s cubic-bezier(.16,1,.3,1)';card.style.transform='translateY(0)';
  });
  card.addEventListener('mousedown',e=>{startX=e.clientX;startY=e.clientY;dragging=true});
  card.addEventListener('mousemove',e=>{
    if(!dragging)return;currentX=e.clientX;currentY=e.clientY;
    const dx=currentX-startX,dy=currentY-startY;
    if(Math.abs(dy)>Math.abs(dx)&&dy<0){card.style.transition='none';card.style.transform=`translateY(${dy*0.5}px)`}
    else if(dx>0){card.style.transition='none';card.style.transform=`translateX(${dx*0.4}px) rotate(${dx*0.02}deg)`}
  });
  card.addEventListener('mouseup',()=>{
    if(!dragging)return;dragging=false;
    const dx=currentX-startX,dy=currentY-startY;
    if(dy<-80&&Math.abs(dy)>Math.abs(dx)){nextCard();return}
    if(dx>100){saveOutfit(card,index);return}
    card.style.transition='transform .4s cubic-bezier(.16,1,.3,1)';card.style.transform='translateY(0)';
  });
  card.addEventListener('mouseleave',()=>{if(dragging){dragging=false;card.style.transition='transform .4s cubic-bezier(.16,1,.3,1)';card.style.transform='translateY(0)'}});

  return card;
}

function buildEndCard(){
  const card=document.createElement('div');
  card.className='outfit-card active';
  card.innerHTML=`
    <div class="oc-bg">
      <div class="oc-blob oc-b1" style="background:rgba(50,40,30,.12)"></div>
      <div class="oc-blob oc-b2" style="background:rgba(40,35,25,.08)"></div>
    </div>
    <div class="end-card">
      <h2>Du har sett alle forslag</h2>
      <p>Legg til flere plagg for nye kombinasjoner. Jo flere plagg, jo flere outfits a oppdage.</p>
    </div>
  `;
  return card;
}

// ═══ LIKE (per outfit now via action button) ═══
function toggleLike(el){
  const isLiked=el.classList.toggle('liked');
  const circle=el.querySelector('.action-circle');
  const svg=circle.querySelector('svg');
  if(isLiked){
    svg.setAttribute('fill','currentColor');
    el.style.transform='scale(1.2)';setTimeout(()=>{el.style.transform=''},300);
  } else {
    svg.setAttribute('fill','none');
  }
}

// ═══ BOOKMARK / HOOK ═══
function bookmarkOutfit(el){
  const isSaved=el.classList.toggle('saved');
  const circle=el.querySelector('.action-circle');
  const svg=circle.querySelector('svg');
  if(isSaved){
    svg.setAttribute('fill','currentColor');
    el.style.transform='scale(1.2)';setTimeout(()=>{el.style.transform=''},300);
  } else {
    svg.setAttribute('fill','none');
  }
}

// ═══ SAVE (swipe right) ═══
function saveOutfit(card,index){
  const flash=card.querySelector('.save-flash');
  flash.classList.add('visible');
  card.style.transition='transform .5s cubic-bezier(.16,1,.3,1)';
  card.style.transform='translateX(120%) rotate(8deg)';
  setTimeout(()=>{card.remove();nextCard()},500);
}

// ═══ NAVIGATION ═══
const container=document.getElementById('container');
let currentCard=null;

function showFirst(){
  const combo=generateCombo();
  currentCard=buildCard(combo,idx,'owned',true);
  container.appendChild(currentCard);
}

function nextCard(){
  if(currentCard){
    currentCard.classList.add('exiting');currentCard.classList.remove('active');
    const old=currentCard;setTimeout(()=>old.remove(),500);
  }
  idx++;
  // Max 20 cards per session
  if(idx>=MAX_CARDS){
    const end=buildEndCard();
    container.appendChild(end);
    currentCard=end;
    return;
  }
  const type=feedType();
  const combo=generateCombo();
  const card=buildCard(combo,idx,type,false);
  card.classList.add('entering');
  container.appendChild(card);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{card.classList.remove('entering');card.classList.add('active')}));
  currentCard=card;
}

showFirst();
</script>
</body>
