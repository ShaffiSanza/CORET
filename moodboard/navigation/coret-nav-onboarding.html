<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORET — Nav Onboarding</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1714;
    --card: #221f1a;
    --card-raised: #282420;
    --border: #2e2a22;
    --border-light: #3a3530;
    --text: #EAE5DE;
    --text-2: #B0A99E;
    --text-3: #6B625C;
    --text-4: #4a4540;
    --gold: #C9A96E;
    --gold-dim: rgba(201,169,110,0.55);
    --gold-soft: rgba(201,169,110,0.10);
    --green: #7A9A6E;
    --green-soft: rgba(122,154,110,0.10);
    --amber: #C4944A;
    --red: #B4705A;
    --r: 14px;
    --r-sm: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #0e0c0a;
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
    -webkit-font-smoothing: antialiased;
  }

  h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 28px;
    color: var(--text);
    margin-bottom: 8px;
    font-weight: 400;
  }
  .subtitle {
    color: var(--text-3);
    font-size: 14px;
    margin-bottom: 16px;
  }

  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 48px;
  }
  .controls button {
    font-family: 'DM Sans', sans-serif;
    padding: 8px 20px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text-2);
    font-size: 13px;
    cursor: pointer;
    transition: all 200ms;
  }
  .controls button:hover {
    background: var(--card-raised);
    color: var(--text);
  }
  .controls button.active {
    background: var(--gold-soft);
    border-color: var(--gold-dim);
    color: var(--gold);
  }

  .phone {
    width: 393px; height: 852px;
    background: var(--bg);
    border-radius: 44px;
    border: 2.5px solid #2a2520;
    overflow: hidden;
    position: relative;
    box-shadow: 0 40px 100px rgba(0,0,0,0.5);
  }

  .phone::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 44px;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
  }

  .scr {
    position: absolute; inset: 0;
    overflow-y: auto;
    padding: 60px 20px 120px;
  }

  .screen-title {
    font-family: 'Instrument Serif', serif;
    font-size: 32px;
    color: var(--text);
    margin-bottom: 8px;
    padding-top: 20px;
  }
  .screen-subtitle {
    font-size: 13px;
    color: var(--text-3);
    margin-bottom: 32px;
  }
  .placeholder-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r);
    height: 120px;
    margin-bottom: 12px;
  }

  /* ===== FLOATING NAV ===== */
  .nav-float {
    position: absolute;
    bottom: 56px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 14px 12px;
    max-width: 160px;
    background: rgba(30,26,21,0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 22px;
    border: 1px solid rgba(255,255,255,0.04);
    /* Onboarding: start hidden */
    opacity: 0;
    transform: translateX(-50%) scale(0.9);
    transition: all 500ms cubic-bezier(0.16, 1, 0.3, 1);
  }
  .nav-float.visible {
    opacity: 1;
    transform: translateX(-50%) scale(1);
  }

  .nav-node {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    transition: all 240ms cubic-bezier(0.16, 1, 0.3, 1);
    opacity: 0.75;
    position: relative;
  }
  .nav-node:hover { opacity: 1; }
  .nav-node:active { transform: scale(1.05); }

  .nav-icon {
    font-size: 14px;
    line-height: 1;
    transition: all 240ms cubic-bezier(0.16, 1, 0.3, 1);
  }
  .nav-label {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-3);
    transition: all 240ms cubic-bezier(0.16, 1, 0.3, 1);
    white-space: nowrap;
  }

  .nav-node.active {
    opacity: 1;
  }
  .nav-node.active .nav-label {
    font-size: 16px;
    font-weight: 500;
    color: var(--gold);
  }
  .nav-node.active .nav-icon {
    color: var(--gold);
    filter: drop-shadow(0 0 8px rgba(201,169,110,0.15));
  }

  .nav-node.active::after {
    content: '';
    position: absolute;
    inset: -6px -10px;
    background: rgba(201,169,110,0.06);
    border-radius: 14px;
    z-index: -1;
    animation: glowPulse 2.4s ease-in-out infinite;
  }

  @keyframes glowPulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  .nav-node.active .nav-label {
    animation: morphIn 240ms cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes morphIn {
    from { transform: scale(0.85); opacity: 0.5; }
    to { transform: scale(1); opacity: 1; }
  }

  /* ===== TOOLTIP ===== */
  .onboard-tooltip {
    position: absolute;
    bottom: 56px;
    left: 50%;
    transform: translateX(-50%) translateX(90px);
    z-index: 60;
    background: var(--card-raised);
    border: 1px solid var(--border-light);
    border-radius: 16px;
    padding: 16px 20px;
    width: 200px;
    opacity: 0;
    pointer-events: none;
    transition: all 400ms cubic-bezier(0.16, 1, 0.3, 1);
  }
  .onboard-tooltip.visible {
    opacity: 1;
  }
  .onboard-tooltip h3 {
    font-family: 'Instrument Serif', serif;
    font-size: 16px;
    font-weight: 400;
    color: var(--gold);
    margin-bottom: 8px;
  }
  .tooltip-item {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 6px;
    font-size: 12px;
    color: var(--text-2);
  }
  .tooltip-item .ti-icon {
    color: var(--text-3);
    font-size: 11px;
    flex-shrink: 0;
  }
  .tooltip-item .ti-name {
    color: var(--text);
    font-weight: 500;
  }

  /* Scrim overlay for onboarding focus */
  .scrim {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 40;
    opacity: 0;
    pointer-events: none;
    transition: opacity 400ms;
    border-radius: 44px;
  }
  .scrim.visible {
    opacity: 1;
  }

  /* Step indicator */
  .step-indicator {
    margin-top: 24px;
    font-size: 13px;
    color: var(--text-3);
    text-align: center;
  }
  .step-indicator span {
    color: var(--gold);
    font-weight: 500;
  }
</style>
</head>
<body>

<h1>Onboarding Flow</h1>
<p class="subtitle">First-time navigation reveal</p>

<div class="controls">
  <button class="active" onclick="goStep(1)">Step 1 — Pulse</button>
  <button onclick="goStep(2)">Step 2 — Tooltip</button>
  <button onclick="goStep(3)">Step 3 — Ready</button>
  <button onclick="playAll()">Play All</button>
</div>

<div class="phone" id="phone">
  <div class="scr">
    <div class="screen-title">Optimize</div>
    <div class="screen-subtitle">Your wardrobe, refined</div>
    <div class="placeholder-card"></div>
    <div class="placeholder-card"></div>
    <div class="placeholder-card"></div>
  </div>

  <div class="scrim" id="scrim"></div>

  <nav class="nav-float" id="nav">
    <div class="nav-node" onclick="activateNode(this)">
      <span class="nav-icon">□</span>
      <span class="nav-label">Wardrobe</span>
    </div>
    <div class="nav-node" onclick="activateNode(this)">
      <span class="nav-icon">◇</span>
      <span class="nav-label">Studio</span>
    </div>
    <div class="nav-node active" onclick="activateNode(this)">
      <span class="nav-icon">◉</span>
      <span class="nav-label">Optimize</span>
    </div>
    <div class="nav-node" onclick="activateNode(this)">
      <span class="nav-icon">◈</span>
      <span class="nav-label">Evolution</span>
    </div>
  </nav>

  <div class="onboard-tooltip" id="tooltip">
    <h3>Your wardrobe system</h3>
    <div class="tooltip-item">
      <span class="ti-icon">□</span>
      <span><span class="ti-name">Wardrobe</span> — Browse & manage</span>
    </div>
    <div class="tooltip-item">
      <span class="ti-icon">◇</span>
      <span><span class="ti-name">Studio</span> — Create outfits</span>
    </div>
    <div class="tooltip-item">
      <span class="ti-icon">◉</span>
      <span><span class="ti-name">Optimize</span> — Scores & insights</span>
    </div>
    <div class="tooltip-item">
      <span class="ti-icon">◈</span>
      <span><span class="ti-name">Evolution</span> — Your journey</span>
    </div>
  </div>
</div>

<div class="step-indicator" id="stepLabel"><span>Step 1</span> — Optimize node pulsing</div>

<script>
const nav = document.getElementById('nav');
const tooltip = document.getElementById('tooltip');
const scrim = document.getElementById('scrim');
const stepLabel = document.getElementById('stepLabel');
const buttons = document.querySelectorAll('.controls button');

let currentStep = 0;

function setButtonActive(idx) {
  buttons.forEach((b, i) => b.classList.toggle('active', i === idx));
}

function goStep(step) {
  currentStep = step;
  const labels = [
    '',
    '<span>Step 1</span> — Optimize node pulsing',
    '<span>Step 2</span> — Tooltip appears',
    '<span>Step 3</span> — Nav ready'
  ];
  stepLabel.innerHTML = labels[step];

  if (step === 1) {
    setButtonActive(0);
    nav.classList.add('visible');
    scrim.classList.add('visible');
    tooltip.classList.remove('visible');
  } else if (step === 2) {
    setButtonActive(1);
    nav.classList.add('visible');
    scrim.classList.add('visible');
    tooltip.classList.add('visible');
  } else if (step === 3) {
    setButtonActive(2);
    nav.classList.add('visible');
    scrim.classList.remove('visible');
    tooltip.classList.remove('visible');
  }
}

function playAll() {
  setButtonActive(3);
  // Reset
  nav.classList.remove('visible');
  scrim.classList.remove('visible');
  tooltip.classList.remove('visible');

  setTimeout(() => goStep(1), 400);
  setTimeout(() => goStep(2), 2000);
  setTimeout(() => goStep(3), 4000);
}

function activateNode(el) {
  const parent = el.closest('.nav-float');
  parent.querySelectorAll('.nav-node').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
}

// Start at step 1
goStep(1);
</script>
</body>
</html>
