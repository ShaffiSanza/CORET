<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORET — Navigation System</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1714;
    --card: #221f1a;
    --card-raised: #282420;
    --border: #2e2a22;
    --border-light: #3a3530;
    --text: #EAE5DE;
    --text-2: #B0A99E;
    --text-3: #6B625C;
    --text-4: #4a4540;
    --gold: #C9A96E;
    --gold-dim: rgba(201,169,110,0.55);
    --gold-soft: rgba(201,169,110,0.10);
    --green: #7A9A6E;
    --green-soft: rgba(122,154,110,0.10);
    --amber: #C4944A;
    --red: #B4705A;
    --r: 14px;
    --r-sm: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #0e0c0a;
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
    -webkit-font-smoothing: antialiased;
  }

  h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 28px;
    color: var(--text);
    margin-bottom: 8px;
    font-weight: 400;
  }
  .subtitle {
    color: var(--text-3);
    font-size: 14px;
    margin-bottom: 48px;
  }

  .showcase {
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .frame-label {
    text-align: center;
    margin-bottom: 16px;
    font-size: 13px;
    color: var(--text-2);
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .phone {
    width: 393px; height: 852px;
    background: var(--bg);
    border-radius: 44px;
    border: 2.5px solid #2a2520;
    overflow: hidden;
    position: relative;
    box-shadow: 0 40px 100px rgba(0,0,0,0.5);
  }

  /* Noise overlay */
  .phone::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 44px;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
  }

  .scr {
    position: absolute; inset: 0;
    overflow-y: auto;
    padding: 60px 20px 120px;
  }

  /* Placeholder screen content */
  .screen-title {
    font-family: 'Instrument Serif', serif;
    font-size: 32px;
    color: var(--text);
    margin-bottom: 8px;
    padding-top: 20px;
  }
  .screen-subtitle {
    font-size: 13px;
    color: var(--text-3);
    margin-bottom: 32px;
  }
  .placeholder-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r);
    height: 120px;
    margin-bottom: 12px;
  }

  /* ===== FLOATING NAV ===== */
  .nav-float {
    position: absolute;
    bottom: 56px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 14px 12px;
    max-width: 160px;
    background: rgba(30,26,21,0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 22px;
    border: 1px solid rgba(255,255,255,0.04);
  }

  .nav-node {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    transition: all 240ms cubic-bezier(0.16, 1, 0.3, 1);
    opacity: 0.75;
    position: relative;
  }
  .nav-node:hover {
    opacity: 1;
  }
  .nav-node:active {
    transform: scale(1.05);
  }

  .nav-icon {
    font-size: 14px;
    line-height: 1;
    transition: all 240ms cubic-bezier(0.16, 1, 0.3, 1);
  }
  .nav-label {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-3);
    transition: all 240ms cubic-bezier(0.16, 1, 0.3, 1);
    white-space: nowrap;
  }

  .nav-node.active {
    opacity: 1;
  }
  .nav-node.active .nav-label {
    font-size: 16px;
    font-weight: 500;
    color: var(--gold);
  }
  .nav-node.active .nav-icon {
    color: var(--gold);
    filter: drop-shadow(0 0 8px rgba(201,169,110,0.15));
  }

  /* Active glow indicator */
  .nav-node.active::after {
    content: '';
    position: absolute;
    inset: -6px -10px;
    background: rgba(201,169,110,0.06);
    border-radius: 14px;
    z-index: -1;
    animation: glowPulse 2.4s ease-in-out infinite;
  }

  @keyframes glowPulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* Node morph animation */
  .nav-node .nav-label {
    transform-origin: center;
  }
  .nav-node.active .nav-label {
    animation: morphIn 240ms cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes morphIn {
    from { transform: scale(0.85); opacity: 0.5; }
    to { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>

<h1>Navigation System</h1>
<p class="subtitle">Floating command node — three states</p>

<div class="showcase">

  <!-- OPTIMIZE ACTIVE (default) -->
  <div>
    <div class="frame-label">Discover (Default)</div>
    <div class="phone">
      <div class="scr">
        <div class="screen-title">Discover</div>
        <div class="screen-subtitle">Your wardrobe, refined</div>
        <div class="placeholder-card"></div>
        <div class="placeholder-card"></div>
        <div class="placeholder-card"></div>
      </div>
      <nav class="nav-float">
        <div class="nav-node" onclick="activateNode(this)">
          <span class="nav-icon">□</span>
          <span class="nav-label">Wardrobe</span>
        </div>
        <div class="nav-node" onclick="activateNode(this)">
          <span class="nav-icon">◇</span>
          <span class="nav-label">Studio</span>
        </div>
        <div class="nav-node active" onclick="activateNode(this)">
          <span class="nav-icon">◉</span>
          <span class="nav-label">Discover</span>
        </div>
      </nav>
    </div>
  </div>

  <!-- WARDROBE ACTIVE -->
  <div>
    <div class="frame-label">Wardrobe</div>
    <div class="phone">
      <div class="scr">
        <div class="screen-title">Wardrobe</div>
        <div class="screen-subtitle">42 garments</div>
        <div class="placeholder-card"></div>
        <div class="placeholder-card"></div>
        <div class="placeholder-card"></div>
      </div>
      <nav class="nav-float">
        <div class="nav-node active" onclick="activateNode(this)">
          <span class="nav-icon">□</span>
          <span class="nav-label">Wardrobe</span>
        </div>
        <div class="nav-node" onclick="activateNode(this)">
          <span class="nav-icon">◇</span>
          <span class="nav-label">Studio</span>
        </div>
        <div class="nav-node" onclick="activateNode(this)">
          <span class="nav-icon">◉</span>
          <span class="nav-label">Discover</span>
        </div>
      </nav>
    </div>
  </div>

  <!-- STUDIO ACTIVE -->
  <div>
    <div class="frame-label">Studio</div>
    <div class="phone">
      <div class="scr">
        <div class="screen-title">Studio</div>
        <div class="screen-subtitle">Create outfits</div>
        <div class="placeholder-card"></div>
        <div class="placeholder-card"></div>
        <div class="placeholder-card"></div>
      </div>
      <nav class="nav-float">
        <div class="nav-node" onclick="activateNode(this)">
          <span class="nav-icon">□</span>
          <span class="nav-label">Wardrobe</span>
        </div>
        <div class="nav-node active" onclick="activateNode(this)">
          <span class="nav-icon">◇</span>
          <span class="nav-label">Studio</span>
        </div>
        <div class="nav-node" onclick="activateNode(this)">
          <span class="nav-icon">◉</span>
          <span class="nav-label">Discover</span>
        </div>
      </nav>
    </div>
  </div>


</div>

<script>
function activateNode(el) {
  const nav = el.closest('.nav-float');
  nav.querySelectorAll('.nav-node').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
}
</script>
</body>
</html>
