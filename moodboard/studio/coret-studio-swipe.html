<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0">
<title>CORET — Studio Swipe Flatlay</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1714;
    --card: #221f1a;
    --border: #2e2a22;
    --text: #EAE5DE;
    --text-2: #B0A99E;
    --text-3: #6B625C;
    --text-4: #4a4540;
    --gold: #C9A96E;
    --gold-dim: rgba(201,169,110,0.55);
    --gold-soft: rgba(201,169,110,0.10);
    --green: #7A9A6E;
    --green-soft: rgba(122,154,110,0.10);
    --red: #B4705A;
    --red-soft: rgba(180,90,70,0.10);
    --r: 18px;
    --r-sm: 10px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #0e0c0a;
    color: var(--text);
    display: flex;
    justify-content: center;
    padding: 40px 20px 60px;
    -webkit-font-smoothing: antialiased;
  }

  .phone {
    width: 393px; height: 852px;
    border-radius: 44px;
    border: 2.5px solid #2a2520;
    overflow: hidden;
    position: relative;
    box-shadow: 0 40px 100px rgba(0,0,0,0.5);
  }

  /* ═══ DYNAMIC BACKGROUND ═══ */
  .dynamic-bg {
    position: absolute;
    inset: 0;
    transition: background 1.8s cubic-bezier(0.16, 1, 0.3, 1);
    z-index: 0;
  }

  .ambient-blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    transition: all 1.8s cubic-bezier(0.16, 1, 0.3, 1);
    pointer-events: none;
  }
  .blob-a { width: 300px; height: 300px; top: 20%; left: -20%; opacity: 0.3; }
  .blob-b { width: 260px; height: 260px; bottom: 10%; right: -15%; opacity: 0.25; }

  .scr {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    z-index: 1;
  }

  /* noise */
  .scr::after {
    content: ''; position: fixed; inset: 0; opacity: 0.012; pointer-events: none; z-index: 100;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  .sb { padding: 14px 24px 0; display: flex; justify-content: space-between; align-items: center; font-size: 15px; font-weight: 600; color: var(--text-2); flex-shrink: 0; }

  /* ═══ HEADER ═══ */
  .studio-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 20px 0;
    flex-shrink: 0;
  }
  .studio-title {
    font-family: 'Instrument Serif', serif;
    font-size: 28px; font-weight: 400;
  }
  .surprise-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px; letter-spacing: 0.8px;
    padding: 8px 16px; border-radius: 20px;
    border: 1px solid rgba(201,169,110,0.15);
    background: rgba(201,169,110,0.06);
    color: var(--gold);
    cursor: pointer;
    transition: all 0.3s;
  }
  .surprise-btn:hover { background: rgba(201,169,110,0.12); border-color: rgba(201,169,110,0.25); }
  .surprise-btn:active { transform: scale(0.95); }

  /* ═══ SCORE FLOAT ═══ */
  .score-float {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 20px 8px;
    flex-shrink: 0;
  }
  .mood-words {
    font-family: 'Instrument Serif', serif;
    font-size: 14px; font-style: italic;
    color: var(--text-3);
    transition: all 0.6s;
  }
  .clarity-float {
    display: flex; align-items: baseline; gap: 6px;
  }
  .clarity-num {
    font-family: 'Instrument Serif', serif;
    font-size: 38px; line-height: 1;
    color: var(--text);
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    text-shadow: 0 0 20px rgba(201,169,110,0.15);
  }
  .clarity-num.flash-green { color: var(--green); text-shadow: 0 0 30px rgba(122,154,110,0.3); }
  .clarity-num.flash-red { color: var(--red); text-shadow: 0 0 30px rgba(180,90,70,0.3); }
  .clarity-label {
    font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text-4);
  }

  /* ═══ FLATLAY AREA ═══ */
  .flatlay {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 0 0;
    position: relative;
    margin-top: -10px;
  }

  /* ═══ SWIPE ROW ═══ */
  .swipe-row {
    width: 100%;
    position: relative;
    overflow: hidden;
    cursor: grab;
    transition: opacity 0.4s;
  }
  .swipe-row:active { cursor: grabbing; }
  .swipe-row.dimmed { opacity: 0.45; }

  /* Row heights by category hierarchy */
  .swipe-row[data-cat="outer"]  { height: 140px; margin-bottom: -14px; z-index: 4; }
  .swipe-row[data-cat="upper"]  { height: 90px;  margin-bottom: -14px; z-index: 3; }
  .swipe-row[data-cat="lower"]  { height: 150px; margin-bottom: -14px; z-index: 2; }
  .swipe-row[data-cat="shoes"]  { height: 80px;  z-index: 1; }

  .swipe-track {
    display: flex;
    height: 100%;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    will-change: transform;
  }

  .swipe-item {
    flex: 0 0 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
  }
  .swipe-item.active { transform: scale(1.0); opacity: 1.0; }
  .swipe-item.inactive { transform: scale(0.92); opacity: 0.6; }

  /* Garment silhouette — filled, colored, heavy shadow */
  .garment-sil {
    filter: drop-shadow(0 25px 40px rgba(0,0,0,0.18));
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* ═══ INSIGHT ═══ */
  .insight {
    text-align: center;
    padding: 12px 30px 0;
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--text-3);
    opacity: 0.7;
    transition: all 0.6s;
    min-height: 36px;
    flex-shrink: 0;
  }

  /* ═══ CTA ═══ */
  .cta-area {
    padding: 16px 20px 0;
    flex-shrink: 0;
  }
  .cta-btn {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    background: rgba(201,169,110,0.10);
    color: var(--gold);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .cta-btn:hover { background: rgba(201,169,110,0.16); }
  .cta-btn:active { transform: scale(0.98); }

  /* ═══ TAB BAR ═══ */
  .tab-bar {
    display: flex; align-items: center; justify-content: space-around;
    padding: 10px 16px 28px;
    background: linear-gradient(transparent, rgba(26,23,20,0.92) 30%);
    backdrop-filter: blur(20px);
    flex-shrink: 0;
  }
  .tab { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 6px 10px; }
  .tab-i { font-size: 17px; opacity: 0.3; }
  .tab-l { font-size: 8.5px; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-4); }
  .tab.on .tab-i { opacity: 1; }
  .tab.on .tab-l { color: var(--gold-dim); }

  .phone-label {
    text-align: center; margin-top: 16px;
    font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--text-4);
  }

  /* ═══ SWIPE INDICATORS ═══ */
  .swipe-dots {
    display: flex; gap: 4px; justify-content: center;
    padding: 6px 0 0;
    position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
  }
  .swipe-dot {
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--text-4); opacity: 0.3;
    transition: all 0.3s;
  }
  .swipe-dot.active { opacity: 1; background: var(--gold); width: 12px; border-radius: 2px; }
</style>
</head>

<script>
// ═══ STATE ═══
const rows = {};
const ROW_IDS = ['outer', 'upper', 'lower', 'shoes'];

// Simulated outfit scores (keyed by combo of selected indices)
const insights = [
  'Sterk tonal dybde mellom frakk og chinos',
  'Kontrast mellom overdel og underdel gir visuell balanse',
  'Nøytral base holder antrekket rolig',
  'Lys base gir et luftig uttrykk',
  'Mork farge-harmoni — enhetlig og strukturert',
  'Oversize ytterlag over fitted base gir lagdybde',
  'Varm tone gjennomgaande — harmonisk',
  'Blanding av varme og kjolige toner skaper spenning',
];

const moodSets = [
  'Structured · Warm · Layered',
  'Refined · Cool · Clean',
  'Relaxed · Earthy · Textured',
  'Minimal · Neutral · Sharp',
  'Bold · Dark · Cohesive',
  'Balanced · Tonal · Grounded',
];

// ═══ INIT ═══
ROW_IDS.forEach(id => {
  const row = document.getElementById('row-' + id);
  const track = document.getElementById('track-' + id);
  const items = track.querySelectorAll('.swipe-item');
  const dotsEl = document.getElementById('dots-' + id);

  rows[id] = {
    el: row,
    track: track,
    items: Array.from(items),
    current: 0,
    count: items.length,
    dotsEl: dotsEl,
    dragging: false,
    startX: 0,
    currentX: 0,
  };

  // Build dots
  for (let i = 0; i < items.length; i++) {
    const dot = document.createElement('div');
    dot.className = 'swipe-dot' + (i === 0 ? ' active' : '');
    dotsEl.appendChild(dot);
  }

  // Touch/mouse events
  row.addEventListener('mousedown', e => startDrag(id, e.clientX));
  row.addEventListener('touchstart', e => startDrag(id, e.touches[0].clientX), { passive: true });
  row.addEventListener('mousemove', e => moveDrag(id, e.clientX));
  row.addEventListener('touchmove', e => moveDrag(id, e.touches[0].clientX), { passive: true });
  row.addEventListener('mouseup', () => endDrag(id));
  row.addEventListener('mouseleave', () => endDrag(id));
  row.addEventListener('touchend', () => endDrag(id));
});

updateAll();

// ═══ DRAG SYSTEM ═══
function startDrag(id, x) {
  const r = rows[id];
  r.dragging = true;
  r.startX = x;
  r.currentX = x;
  r.track.style.transition = 'none';

  // Dim other rows
  ROW_IDS.forEach(rid => {
    if (rid !== id) rows[rid].el.classList.add('dimmed');
  });
}

function moveDrag(id, x) {
  const r = rows[id];
  if (!r.dragging) return;
  r.currentX = x;
  const diff = r.currentX - r.startX;
  const base = -r.current * r.el.offsetWidth;
  r.track.style.transform = `translateX(${base + diff}px)`;
}

function endDrag(id) {
  const r = rows[id];
  if (!r.dragging) return;
  r.dragging = false;
  r.track.style.transition = '';

  const diff = r.currentX - r.startX;
  const threshold = r.el.offsetWidth * 0.25;

  if (diff < -threshold && r.current < r.count - 1) {
    r.current++;
  } else if (diff > threshold && r.current > 0) {
    r.current--;
  }

  snapTo(id, r.current);

  // Un-dim all
  ROW_IDS.forEach(rid => rows[rid].el.classList.remove('dimmed'));
}

function snapTo(id, index) {
  const r = rows[id];
  r.current = index;
  r.track.style.transform = `translateX(${-index * r.el.offsetWidth}px)`;

  // Update active/inactive
  r.items.forEach((item, i) => {
    item.classList.toggle('active', i === index);
    item.classList.toggle('inactive', i !== index);
  });

  // Update dots
  r.dotsEl.querySelectorAll('.swipe-dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === index);
  });

  updateAll();
}

// ═══ UPDATE ═══
function updateAll() {
  updateBackground();
  updateScore();
  updateMood();
  updateInsight();
}

function getActiveColors() {
  return ROW_IDS.map(id => {
    const r = rows[id];
    return r.items[r.current].dataset.color;
  });
}

function hexToHSL(hex) {
  let r = parseInt(hex.slice(1,3), 16) / 255;
  let g = parseInt(hex.slice(3,5), 16) / 255;
  let b = parseInt(hex.slice(5,7), 16) / 255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h, s, l = (max+min)/2;
  if (max === min) { h = s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d/(2-max-min) : d/(max+min);
    switch(max) {
      case r: h = ((g-b)/d + (g<b?6:0))/6; break;
      case g: h = ((b-r)/d+2)/6; break;
      case b: h = ((r-g)/d+4)/6; break;
    }
  }
  return [h*360, s*100, l*100];
}

function updateBackground() {
  const colors = getActiveColors();
  let hSum=0, sSum=0, lSum=0;
  colors.forEach(c => {
    const [h,s,l] = hexToHSL(c);
    hSum += h; sSum += s; lSum += l;
  });
  const n = colors.length;
  const avgH = hSum/n, avgS = sSum/n, avgL = lSum/n;

  const bg = document.getElementById('dynamicBg');
  const darkL = Math.max(avgL * 0.15, 5);
  const midL = Math.max(avgL * 0.22, 8);
  bg.style.background = `
    radial-gradient(circle at 30% 25%, hsl(${avgH}, ${avgS*0.4}%, ${midL}%) 0%, transparent 60%),
    radial-gradient(circle at 70% 75%, hsl(${avgH+20}, ${avgS*0.3}%, ${darkL}%) 0%, transparent 50%),
    hsl(${avgH}, ${avgS*0.15}%, ${darkL * 0.7}%)
  `;

  const blobA = document.getElementById('blobA');
  const blobB = document.getElementById('blobB');
  blobA.style.background = `hsl(${avgH}, ${avgS*0.5}%, ${avgL*0.25}%)`;
  blobB.style.background = `hsl(${avgH+30}, ${avgS*0.4}%, ${avgL*0.2}%)`;
}

function updateScore() {
  // Simulated scoring based on color harmony
  const colors = getActiveColors();
  const hsls = colors.map(hexToHSL);

  // Simple harmony: lower hue variance = higher score
  const hues = hsls.map(h => h[0]);
  const meanH = hues.reduce((a,b)=>a+b,0)/hues.length;
  const variance = hues.reduce((a,h)=>a+Math.pow(h-meanH,2),0)/hues.length;
  const harmony = Math.max(60, Math.min(96, 95 - Math.sqrt(variance) * 0.3));
  const score = Math.round(harmony);

  const el = document.getElementById('clarityNum');
  const prev = parseInt(el.textContent);

  el.textContent = score;
  el.style.transform = 'scale(1.12)';
  setTimeout(() => { el.style.transform = 'scale(1)'; }, 300);

  if (score > prev) {
    el.classList.add('flash-green');
    setTimeout(() => el.classList.remove('flash-green'), 600);
  } else if (score < prev) {
    el.classList.add('flash-red');
    setTimeout(() => el.classList.remove('flash-red'), 600);
  }
}

function updateMood() {
  const idx = (rows.outer.current + rows.upper.current + rows.lower.current + rows.shoes.current) % moodSets.length;
  document.getElementById('moodWords').textContent = moodSets[idx];
}

function updateInsight() {
  const idx = (rows.outer.current * 3 + rows.upper.current * 2 + rows.lower.current + rows.shoes.current) % insights.length;
  document.getElementById('insight').textContent = insights[idx];
}

// ═══ SURPRISE ═══
function surprise() {
  const delays = [0, 120, 240, 360];
  ROW_IDS.forEach((id, i) => {
    setTimeout(() => {
      const r = rows[id];
      const newIdx = Math.floor(Math.random() * r.count);
      snapTo(id, newIdx);
    }, delays[i]);
  });
}
