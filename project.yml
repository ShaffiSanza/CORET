name: CORET
options:
  bundleIdPrefix: com.coret
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  COREEngine:
    path: engine

targets:
  CORET:
    type: application
    platform: iOS
    sources:
      - path: ios/App
      - path: ios/Views
      - path: ios/ViewModels
      - path: ios/Persistence
      - path: ios/Coordinators
      - path: ios/Design
      - path: ios/Debug
    dependencies:
      - package: COREEngine
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_CFBundleDisplayName: CORET
        PRODUCT_BUNDLE_IDENTIFIER: com.coret.app
        DEVELOPMENT_TEAM: ""
        CODE_SIGNING_ALLOWED: false
