name: CORET
options:
  bundleIdPrefix: com.coret
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  COREEngine:
    path: engine

targets:
  CORET:
    type: application
    platform: iOS
    sources:
      - path: ios/App
      - path: ios/Views
      - path: ios/ViewModels
      - path: ios/Persistence
      - path: ios/Coordinators
      - path: ios/Design
      - path: ios/Debug
      - path: ios/Networking
      - path: ios/Services
      - path: ios/Config
        excludes:
          - "*.xcconfig"
          - "*.example"
    dependencies:
      - package: COREEngine
    configFiles:
      Debug: ios/Config/Secrets.xcconfig
      Release: ios/Config/Secrets.xcconfig
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: true
        CORET_API_KEY: $(CORET_API_KEY)
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_CFBundleDisplayName: CORET
        PRODUCT_BUNDLE_IDENTIFIER: com.coret.app
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: "YES"
        INFOPLIST_KEY_NSCameraUsageDescription: "CORET trenger kamera for å ta bilde av plagg"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "CORET trenger tilgang for å velge bilder av plagg"
